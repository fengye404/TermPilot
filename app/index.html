<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="theme-color" content="#0b0f12" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <meta name="termpilot-app-version" content="%VITE_APP_VERSION%" />
    <meta name="termpilot-app-build" content="%VITE_APP_BUILD_ID%" />
    <title>TermPilot</title>
    <script>
      (function () {
        const BUILD_KEY = "termpilot-app-build";
        if (!("serviceWorker" in navigator)) {
          try {
            const currentBuild = document.querySelector('meta[name="termpilot-app-build"]')?.getAttribute("content") || "";
            if (currentBuild) {
              window.localStorage.setItem(BUILD_KEY, currentBuild);
            }
          } catch {
            // ignore
          }
          return;
        }

        const host = window.location.host;
        const currentBuild = document.querySelector('meta[name="termpilot-app-build"]')?.getAttribute("content") || "";
        const staleCachePrefixes = [
          "workbox-",
          "vite-pwa-",
          "termpilot-",
        ];

        const cleanupPromise = Promise.allSettled([
          navigator.serviceWorker.getRegistrations().then((registrations) => Promise.allSettled(
            registrations
              .filter((registration) => registration.scope.includes(host))
              .map(async (registration) => {
                try {
                  const activeUrl = registration.active?.scriptURL ?? "";
                  const waitingUrl = registration.waiting?.scriptURL ?? "";
                  const installingUrl = registration.installing?.scriptURL ?? "";
                  if (
                    activeUrl.endsWith("/sw.js")
                    || activeUrl.endsWith("/service-worker.js")
                    || waitingUrl.endsWith("/sw.js")
                    || waitingUrl.endsWith("/service-worker.js")
                    || installingUrl.endsWith("/sw.js")
                    || installingUrl.endsWith("/service-worker.js")
                  ) {
                    await registration.unregister();
                  }
                } catch {
                  // ignore
                }
              }),
          )),
          ("caches" in window)
            ? caches.keys().then((keys) => Promise.allSettled(
              keys
                .filter((key) => staleCachePrefixes.some((prefix) => key.startsWith(prefix)))
                .map((key) => caches.delete(key)),
            ))
            : Promise.resolve(),
        ]);

        window.__termpilotCleanupPromise = cleanupPromise;

        try {
          const previousBuild = window.localStorage.getItem(BUILD_KEY) || "";
          if (currentBuild && previousBuild && previousBuild !== currentBuild) {
            void cleanupPromise;
          }
          if (currentBuild) {
            window.localStorage.setItem(BUILD_KEY, currentBuild);
          }
        } catch {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
